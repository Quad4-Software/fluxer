name: fluxer

# Coolify deployment variant. Traefik terminates TLS and forwards to Caddy on :80.
# Set the Caddy service domain in Coolify to https://YOUR.DOMAIN:80
# Use docker-compose.yml for direct Docker/Caddy deployments.

x-fluxer-env: &fluxer-env
  FLUXER_ENV: production
  NODE_ENV: production
  FLUXER_SELF_HOSTED: "true"
  FLUXER_BASE_DOMAIN: ${FLUXER_DOMAIN:?set FLUXER_DOMAIN in .env}
  FLUXER_PUBLIC_SCHEME: ${FLUXER_PUBLIC_SCHEME:-https}
  FLUXER_PUBLIC_PORT: ${FLUXER_PUBLIC_PORT:-443}
  FLUXER_TRUST_CLIENT_IP_HEADER: "true"
  FLUXER_CLIENT_IP_HEADER_NAME: ${FLUXER_CLIENT_IP_HEADER_NAME:-x-forwarded-for}

  FLUXER_DATABASE_BACKEND: postgres
  FLUXER_POSTGRES_HOST: postgres
  FLUXER_POSTGRES_PORT: "5432"
  FLUXER_POSTGRES_DATABASE: fluxer
  FLUXER_POSTGRES_USERNAME: fluxer
  FLUXER_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
  FLUXER_POSTGRES_SSL: "false"

  FLUXER_KV_URL: redis://valkey:6379/0
  FLUXER_NATS_URL: nats://nats:4222
  FLUXER_NATS_JETSTREAM_URL: nats://nats:4222
  FLUXER_SVC_NATS_URL: nats://nats:4222
  FLUXER_SVC_SHARD_COUNT: "1"

  FLUXER_SEARCH_ENGINE: meilisearch
  FLUXER_SEARCH_URL: http://meilisearch:7700
  FLUXER_SEARCH_API_KEY: ${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY in .env}

  FLUXER_S3_ENDPOINT: http://seaweedfs:8333
  FLUXER_S3_PUBLIC_ENDPOINT: http://seaweedfs:8333
  FLUXER_S3_REGION: us-east-1
  FLUXER_S3_ACCESS_KEY_ID: ${FLUXER_S3_ACCESS_KEY:?set FLUXER_S3_ACCESS_KEY in .env}
  FLUXER_S3_SECRET_ACCESS_KEY: ${FLUXER_S3_SECRET_KEY:?set FLUXER_S3_SECRET_KEY in .env}
  FLUXER_S3_FORCE_PATH_STYLE: "true"
  FLUXER_S3_BUCKET_CDN: fluxer
  FLUXER_S3_BUCKET_UPLOADS: fluxer-uploads
  FLUXER_S3_BUCKET_DOWNLOADS: fluxer-downloads
  FLUXER_S3_BUCKET_REPORTS: fluxer-reports
  FLUXER_S3_BUCKET_HARVESTS: fluxer-harvests
  AWS_ACCESS_KEY_ID: ${FLUXER_S3_ACCESS_KEY:?}
  AWS_SECRET_ACCESS_KEY: ${FLUXER_S3_SECRET_KEY:?}
  AWS_DEFAULT_REGION: us-east-1
  AWS_EC2_METADATA_DISABLED: "true"

  FLUXER_LIVEKIT_ENABLED: "true"
  FLUXER_LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?set LIVEKIT_API_KEY in .env}
  FLUXER_LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?set LIVEKIT_API_SECRET in .env}
  FLUXER_LIVEKIT_WEBHOOK_URL: http://api:8080/webhooks/livekit
  FLUXER_LIVEKIT_DEFAULT_REGION: '{"id":"default","name":"Default","emoji":"🌍","latitude":0,"longitude":0}'

  FLUXER_KLIPY_API_KEY: ${FLUXER_KLIPY_API_KEY:-}

  FLUXER_EMAIL_ENABLED: ${FLUXER_EMAIL_ENABLED:-false}
  FLUXER_EMAIL_PROVIDER: ${FLUXER_EMAIL_PROVIDER:-none}
  FLUXER_EMAIL_FROM_EMAIL: ${FLUXER_EMAIL_FROM_EMAIL:-noreply@localhost}
  FLUXER_EMAIL_FROM_NAME: ${FLUXER_EMAIL_FROM_NAME:-Fluxer}
  FLUXER_EMAIL_SMTP_HOST: ${FLUXER_EMAIL_SMTP_HOST:-}
  FLUXER_EMAIL_SMTP_PORT: ${FLUXER_EMAIL_SMTP_PORT:-587}
  FLUXER_EMAIL_SMTP_USERNAME: ${FLUXER_EMAIL_SMTP_USERNAME:-}
  FLUXER_EMAIL_SMTP_PASSWORD: ${FLUXER_EMAIL_SMTP_PASSWORD:-}
  FLUXER_EMAIL_SMTP_SECURE: ${FLUXER_EMAIL_SMTP_SECURE:-true}

  FLUXER_SMS_ENABLED: "false"
  FLUXER_CAPTCHA_ENABLED: ${FLUXER_CAPTCHA_ENABLED:-true}
  FLUXER_CAPTCHA_PROVIDER: ${FLUXER_CAPTCHA_PROVIDER:-altcha}
  FLUXER_CAPTCHA_ALTCHA_HMAC_SECRET: ${FLUXER_CAPTCHA_ALTCHA_HMAC_SECRET:?set FLUXER_CAPTCHA_ALTCHA_HMAC_SECRET in .env}
  FLUXER_STRIPE_ENABLED: "false"
  FLUXER_NCMEC_ENABLED: "false"
  FLUXER_CLAMAV_ENABLED: "false"
  FLUXER_EASYPWNED_ENABLED: ${FLUXER_EASYPWNED_ENABLED:-false}
  FLUXER_EASYPWNED_URL: ${FLUXER_EASYPWNED_URL:-http://easypwned:3342}
  FLUXER_EASYPWNED_FAIL_OPEN: ${FLUXER_EASYPWNED_FAIL_OPEN:-true}
  FLUXER_DISCOVERY_ENABLED: ${FLUXER_DISCOVERY_ENABLED:-true}
  FLUXER_SENTRY_ENABLED: ${FLUXER_SENTRY_ENABLED:-false}
  FLUXER_SENTRY_CLIENT_ENABLED: ${FLUXER_SENTRY_CLIENT_ENABLED:-false}
  FLUXER_SENTRY_DSN: ${FLUXER_SENTRY_DSN:-}
  FLUXER_SENTRY_ENVIRONMENT: ${FLUXER_SENTRY_ENVIRONMENT:-}

  FLUXER_SUDO_MODE_SECRET: ${FLUXER_SUDO_MODE_SECRET:?set FLUXER_SUDO_MODE_SECRET in .env}
  FLUXER_CONNECTION_INITIATION_SECRET: ${FLUXER_CONNECTION_INITIATION_SECRET:?set FLUXER_CONNECTION_INITIATION_SECRET in .env}
  FLUXER_VAPID_PUBLIC_KEY: ${FLUXER_VAPID_PUBLIC_KEY:?set FLUXER_VAPID_PUBLIC_KEY in .env}
  FLUXER_VAPID_PRIVATE_KEY: ${FLUXER_VAPID_PRIVATE_KEY:?set FLUXER_VAPID_PRIVATE_KEY in .env}
  FLUXER_VAPID_EMAIL: ${FLUXER_VAPID_EMAIL:-admin@${FLUXER_DOMAIN}}
  FLUXER_GATEWAY_RPC_AUTH_TOKEN: ${FLUXER_GATEWAY_RPC_AUTH_TOKEN:?set FLUXER_GATEWAY_RPC_AUTH_TOKEN in .env}
  FLUXER_MEDIA_PROXY_SECRET_KEY: ${FLUXER_MEDIA_PROXY_SECRET_KEY:?set FLUXER_MEDIA_PROXY_SECRET_KEY in .env}
  FLUXER_MEDIA_PROXY_UPLOAD_RELAY_SECRET_BASE64: ${FLUXER_MEDIA_PROXY_UPLOAD_RELAY_SECRET_BASE64:?set FLUXER_MEDIA_PROXY_UPLOAD_RELAY_SECRET_BASE64 in .env}
  FLUXER_ADMIN_SECRET_KEY_BASE: ${FLUXER_ADMIN_SECRET_KEY_BASE:?set FLUXER_ADMIN_SECRET_KEY_BASE in .env}
  FLUXER_ADMIN_OAUTH_CLIENT_SECRET: ${FLUXER_ADMIN_OAUTH_CLIENT_SECRET:?set FLUXER_ADMIN_OAUTH_CLIENT_SECRET in .env}

  FLUXER_INTERNAL_API_ENDPOINT: http://api:8080
  FLUXER_INTERNAL_GATEWAY_ENDPOINT: http://gateway:8080
  FLUXER_INTERNAL_MEDIA_PROXY_ENDPOINT: http://media-proxy:8080
  FLUXER_MARKETING_ENDPOINT: ${FLUXER_PUBLIC_URL:-https://${FLUXER_DOMAIN}}
  FLUXER_MEDIA_PROXY_ENDPOINT: http://media-proxy:8080
  FLUXER_MEDIA_ENDPOINT: ${FLUXER_PUBLIC_URL:-https://${FLUXER_DOMAIN}}/media
  FLUXER_MEDIA_PROXY_UPLOAD_RELAY_ENDPOINT: ${FLUXER_PUBLIC_URL:-https://${FLUXER_DOMAIN}}/media

x-fluxer-service: &fluxer-service
  restart: unless-stopped
  networks: [fluxer]

services:
  caddy:
    image: caddy:2.10-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    restart: unless-stopped
    networks:
      - fluxer
      - coolify
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api: {condition: service_healthy}
      gateway: {condition: service_healthy}
      media-proxy: {condition: service_healthy}
      static-proxy: {condition: service_started}
      admin: {condition: service_started}

  postgres:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    restart: unless-stopped
    networks: [fluxer]
    shm_size: 256mb
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=384MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - max_connections=150
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
    environment:
      POSTGRES_DB: fluxer
      POSTGRES_USER: fluxer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxer -d fluxer"]
      interval: 10s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8.1-alpine@sha256:cfe71288f087704b06be45e270afa7a2abbf820093d6b11a23762081f5ff321d
    restart: unless-stopped
    networks: [fluxer]
    command:
      - valkey-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - ${FLUXER_VALKEY_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.14-alpine@sha256:c11af972c99ae542de8925e6a7d9c533aa1eb039660420d2074beed6089b3bf0
    restart: unless-stopped
    networks: [fluxer]
    command:
      - -js
      - -sd
      - /data
      - -m
      - "8222"
      - --max_payload
      - "8388608"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8222 && printf 'GET /healthz HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q '200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  meilisearch:
    image: getmeili/meilisearch:v1.12@sha256:c9fac23131cca4db95173d41cc50fd5639121ee381795528fdd7522d7978a7b8
    restart: unless-stopped
    networks: [fluxer]
    environment:
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY in .env}
      MEILI_MAX_INDEXING_MEMORY: ${FLUXER_MEILI_MAX_INDEXING_MEMORY:-512Mb}
      MEILI_HTTP_PAYLOAD_SIZE_LIMIT: ${FLUXER_MEILI_HTTP_PAYLOAD_SIZE_LIMIT:-104857600}
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7700/health | grep -q available"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  seaweedfs:
    image: chrislusf/seaweedfs:4.34@sha256:6620371e8af8282056685c652d4637265698c9e2c2d59f9594e6ac333ad6c634
    restart: unless-stopped
    networks: [fluxer]
    command: ["server", "-s3", "-dir=/data"]
    environment:
      AWS_ACCESS_KEY_ID: ${FLUXER_S3_ACCESS_KEY:?set FLUXER_S3_ACCESS_KEY in .env}
      AWS_SECRET_ACCESS_KEY: ${FLUXER_S3_SECRET_KEY:?set FLUXER_S3_SECRET_KEY in .env}
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9333/dir/status >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  seaweedfs-init:
    image: chrislusf/seaweedfs:4.34@sha256:6620371e8af8282056685c652d4637265698c9e2c2d59f9594e6ac333ad6c634
    networks: [fluxer]
    depends_on:
      seaweedfs: {condition: service_healthy}
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for SeaweedFS to initialise..."
        sleep 12
        echo "Creating S3 buckets..."
        printf 's3.bucket.create -name fluxer\ns3.bucket.create -name fluxer-uploads\ns3.bucket.create -name fluxer-downloads\ns3.bucket.create -name fluxer-reports\ns3.bucket.create -name fluxer-harvests\nexit\n' | weed shell -master=seaweedfs:9333 2>&1 &
        WEED_PID=$$!
        sleep 15
        kill $$WEED_PID 2>/dev/null || true
        echo "buckets ready"

  livekit:
    image: livekit/livekit-server:v1.12.0@sha256:b1281e66e35e8f9749ffbcf0fe6ab4d40d1438aa00f36c2ea7e6975e5e261e2e
    restart: unless-stopped
    networks: [fluxer]
    command: ["--config", "/etc/livekit.yaml"]
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:?set LIVEKIT_API_KEY in .env}: ${LIVEKIT_API_SECRET:?set LIVEKIT_API_SECRET in .env}"
    configs:
      - source: livekit_config
        target: /etc/livekit.yaml
    ports:
      - "${FLUXER_LIVEKIT_TCP_PORT:-7881}:7881"
      - "${FLUXER_LIVEKIT_UDP_PORT:-7882}:7882/udp"

  api:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-api:${FLUXER_IMAGE_TAG:-v1}
    environment:
      <<: *fluxer-env
      FLUXER_API_PORT: "8080"
      FLUXER_API_PRESIGNED_ATTACHMENT_UPLOADS_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/_health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    depends_on:
      postgres: {condition: service_healthy}
      valkey: {condition: service_healthy}
      nats: {condition: service_healthy}
      meilisearch: {condition: service_healthy}
      seaweedfs-init: {condition: service_completed_successfully}
      gifs: {condition: service_started}
      gifs-shard: {condition: service_started}
      snowflakes: {condition: service_started}
      snowflakes-shard: {condition: service_started}
      messages: {condition: service_started}
      messages-shard: {condition: service_started}
      users: {condition: service_started}
      users-shard: {condition: service_started}
      easypwned: {condition: service_healthy, required: false}

  worker:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-api:${FLUXER_IMAGE_TAG:-v1}
    working_dir: /usr/src/app/fluxer_api
    command: ["./node_modules/.bin/tsx", "src/WorkerEntrypoint.ts"]
    environment:
      <<: *fluxer-env
      FLUXER_API_WORKER_MODE: all_lanes
      FLUXER_API_WORKER_ENABLE_CRON_SCHEDULER: "true"
      FLUXER_API_WORKER_ENABLE_VOICE_RECONCILIATION: "true"
    depends_on:
      api: {condition: service_healthy}
      nats: {condition: service_healthy}
      postgres: {condition: service_healthy}
      valkey: {condition: service_healthy}
      seaweedfs-init: {condition: service_completed_successfully}
      snowflakes-shard: {condition: service_started}
      messages-shard: {condition: service_started}
      users-shard: {condition: service_started}

  gateway:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-gateway:${FLUXER_IMAGE_TAG:-v1}
    environment:
      <<: *fluxer-env
      FLUXER_GATEWAY_PORT: "8080"
      FLUXER_GATEWAY_MEDIA_PROXY_ENDPOINT: ${FLUXER_PUBLIC_URL:-https://${FLUXER_DOMAIN}}/media
      FLUXER_GATEWAY_STATIC_CDN_ENDPOINT: ${FLUXER_PUBLIC_URL:-https://${FLUXER_DOMAIN}}
      FLUXER_GATEWAY_LOGGER_LEVEL: info
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/_health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 45s
    depends_on:
      nats: {condition: service_healthy}
      valkey: {condition: service_healthy}

  media-proxy:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-media-proxy:${FLUXER_IMAGE_TAG:-v1}
    environment:
      <<: *fluxer-env
      FLUXER_MEDIA_PROXY_HOST: 0.0.0.0
      FLUXER_MEDIA_PROXY_PORT: "8080"
      FLUXER_MEDIA_PROXY_MODE: upload
      FLUXER_MEDIA_PROXY_STORAGE_BACKEND: s3
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /_health HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q '200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    depends_on:
      seaweedfs-init: {condition: service_completed_successfully}
      nats: {condition: service_started}

  static-proxy:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-static:${FLUXER_IMAGE_TAG:-v1}

  app-proxy:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-app-proxy-self-hosted:${FLUXER_IMAGE_TAG:-v1}
    environment:
      FLUXER_APP_PROXY_HOST: 0.0.0.0
      FLUXER_APP_PROXY_PORT: "8080"
      DISCOVERY_UPSTREAM_URL: http://caddy:8088/api/.well-known/fluxer
      PUBLIC_BOOTSTRAP_API_ENDPOINT: /api
      PUBLIC_BOOTSTRAP_API_PUBLIC_ENDPOINT: ${FLUXER_PUBLIC_URL:-https://${FLUXER_DOMAIN}}/api
    depends_on:
      api: {condition: service_healthy}
      caddy: {condition: service_started}

  snowflakes:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-snowflakes:${FLUXER_IMAGE_TAG:-v1}
    environment:
      <<: *fluxer-env
      FLUXER_SVC_MODE: router
    depends_on:
      nats: {condition: service_started}

  snowflakes-shard:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-snowflakes:${FLUXER_IMAGE_TAG:-v1}
    environment:
      <<: *fluxer-env
      FLUXER_SVC_MODE: shard
      FLUXER_SVC_SHARD_ID: "0"
    depends_on:
      nats: {condition: service_started}

  users:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-users:${FLUXER_IMAGE_TAG:-v1}
    environment:
      <<: *fluxer-env
      FLUXER_SVC_MODE: router
    depends_on:
      nats: {condition: service_started}

  users-shard:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-users:${FLUXER_IMAGE_TAG:-v1}
    environment:
      <<: *fluxer-env
      FLUXER_SVC_MODE: shard
      FLUXER_SVC_SHARD_ID: "0"
    depends_on:
      nats: {condition: service_started}

  gifs:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-gifs:${FLUXER_IMAGE_TAG:-v1}
    environment:
      <<: *fluxer-env
      FLUXER_SVC_NAME: gifs
      FLUXER_SVC_MODE: router
      FLUXER_MEDIA_PROXY_PUBLIC_ENDPOINT: ${FLUXER_PUBLIC_URL:-https://${FLUXER_DOMAIN}}/media
    depends_on:
      nats: {condition: service_started}

  gifs-shard:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-gifs:${FLUXER_IMAGE_TAG:-v1}
    environment:
      <<: *fluxer-env
      FLUXER_SVC_NAME: gifs
      FLUXER_SVC_MODE: shard
      FLUXER_SVC_SHARD_ID: "0"
      FLUXER_MEDIA_PROXY_PUBLIC_ENDPOINT: ${FLUXER_PUBLIC_URL:-https://${FLUXER_DOMAIN}}/media
    depends_on:
      nats: {condition: service_started}

  messages:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-messages:${FLUXER_IMAGE_TAG:-v1}
    environment:
      <<: *fluxer-env
      FLUXER_SVC_MODE: router
    depends_on:
      nats: {condition: service_started}

  messages-shard:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-messages:${FLUXER_IMAGE_TAG:-v1}
    environment:
      <<: *fluxer-env
      FLUXER_SVC_MODE: shard
      FLUXER_SVC_SHARD_ID: "0"
    depends_on:
      nats: {condition: service_started}
      postgres: {condition: service_healthy}

  unfurl:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-unfurl:${FLUXER_IMAGE_TAG:-v1}
    environment:
      <<: *fluxer-env
      FLUXER_SVC_MODE: router
    depends_on:
      nats: {condition: service_started}

  unfurl-shard:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-unfurl:${FLUXER_IMAGE_TAG:-v1}
    environment:
      <<: *fluxer-env
      FLUXER_SVC_MODE: shard
      FLUXER_SVC_SHARD_ID: "0"
    depends_on:
      nats: {condition: service_started}

  admin:
    <<: *fluxer-service
    image: ${FLUXER_REGISTRY:-ghcr.io/${FLUXER_REGISTRY_OWNER:-fluxerapp}}/fluxer-admin:${FLUXER_IMAGE_TAG:-v1}
    environment:
      <<: *fluxer-env
      FLUXER_ADMIN_HOST: 0.0.0.0
      FLUXER_ADMIN_PORT: "8080"
      FLUXER_ADMIN_BASE_PATH: /admin
      FLUXER_API_ENDPOINT: http://api:8080
      FLUXER_INTERNAL_GATEWAY_ENDPOINT: http://gateway:8080
      FLUXER_INTERNAL_MEDIA_PROXY_ENDPOINT: http://media-proxy:8080
      FLUXER_BACKUP_META_PATH: /backups/data/latest-meta.json
      FLUXER_ADMIN_ENDPOINT: ${FLUXER_PUBLIC_URL:-https://${FLUXER_DOMAIN}}/admin
      FLUXER_APP_ENDPOINT: ${FLUXER_PUBLIC_URL:-https://${FLUXER_DOMAIN}}
      FLUXER_MEDIA_ENDPOINT: ${FLUXER_PUBLIC_URL:-https://${FLUXER_DOMAIN}}/media
      FLUXER_STATIC_CDN_ENDPOINT: ${FLUXER_PUBLIC_URL:-https://${FLUXER_DOMAIN}}
      FLUXER_ADMIN_OAUTH_REDIRECT_URI: ${FLUXER_PUBLIC_URL:-https://${FLUXER_DOMAIN}}/admin/oauth2_callback
    volumes:
      - ./backups/data:/backups/data:ro
    depends_on:
      api: {condition: service_healthy}

  easypwned:
    image: easybill/easypwned:v0.29.2@sha256:716d61a6c319fe3ab3eb58d0ec6291bf9eec2e3dddd9d8ed653d6620d8b1e584
    profiles: [easypwned]
    restart: unless-stopped
    networks: [fluxer]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/3342 && printf \"GET /hash/5BAA61E4C9B93F3F0682250B6CF8331B7EE68FD8 HTTP/1.0\\r\\n\\r\\n\" >&3 && grep -q \"\\\"secure\\\":false\" <&3'",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

networks:
  fluxer:
    driver: bridge
  coolify:
    external: true

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
  nats-data:
  meilisearch-data:
  seaweedfs-data:

configs:
  caddyfile:
    content: |
      {
        servers {
          trusted_proxies static private_ranges
        }
      }

      (upstream_transport) {
        transport http {
          keepalive 2m
          keepalive_idle_conns 50
          read_timeout 5m
          write_timeout 5m
        }
      }

      (proxy_api) {
        encode zstd gzip {
          minimum_length 1024
        }
        request_body {
          max_size 50MB
        }
        reverse_proxy api:8080 {
          transport http {
            keepalive 2m
            keepalive_idle_conns 100
            read_timeout 5m
            write_timeout 5m
          }
        }
      }

      (proxy_gateway) {
        reverse_proxy gateway:8080 {
          transport http {
            keepalive 2m
            keepalive_idle_conns 100
            read_timeout 1h
            write_timeout 1h
          }
          flush_interval -1
        }
      }

      (proxy_media) {
        reverse_proxy media-proxy:8080 {
          transport http {
            keepalive 2m
            keepalive_idle_conns 50
            read_timeout 15m
            write_timeout 15m
            response_header_timeout 15m
          }
          flush_interval -1
        }
      }

      (proxy_livekit) {
        reverse_proxy livekit:7880 {
          transport http {
            keepalive 2m
            keepalive_idle_conns 50
            read_timeout 1h
            write_timeout 1h
          }
          flush_interval -1
        }
      }

      :80 {
        handle_path /api/* {
          import proxy_api
        }

        handle /gateway {
          rewrite * /
          import proxy_gateway
        }

        handle_path /gateway/* {
          import proxy_gateway
        }

        handle_path /media/* {
          import proxy_media
        }

        handle_path /livekit/* {
          import proxy_livekit
        }

        handle /admin {
          rewrite * /
          reverse_proxy admin:8080 {
            import upstream_transport
          }
        }

        handle_path /admin/* {
          reverse_proxy admin:8080 {
            import upstream_transport
          }
        }

        @staticAssets path /fonts/* /web/* /emoji/* /libs/* /avatars/* /badges/* /desktop/* /embeds/*
        handle @staticAssets {
          reverse_proxy static-proxy:8080 {
            import upstream_transport
          }
        }

        handle {
          reverse_proxy app-proxy:8080 {
            import upstream_transport
          }
        }
      }

      :8088 {
        handle_path /api/* {
          reverse_proxy api:8080 {
            transport http {
              keepalive 2m
              keepalive_idle_conns 20
              read_timeout 30s
              write_timeout 30s
            }
          }
        }
      }

  livekit_config:
    content: |
      port: 7880
      log_level: info

      rtc:
        tcp_port: 7881
        udp_port: 7882
        use_external_ip: true
        stun_servers:
          - stun.l.google.com:19302
          - stun1.l.google.com:19302

      webhook:
        api_key: fluxer
        urls:
          - http://api:8080/webhooks/livekit
